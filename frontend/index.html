<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HarnNgeinHub | หารเงินในกลุ่มเพื่อน</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>💸 HarnNgeinHub</h1>
            <button id="theme-toggle">🌙 Dark Mode</button>
        </header>

        <div id="toast" class="toast hidden"></div>

        <section id="home-section" class="card active">
            <h2>สร้างกลุ่มใหม่</h2>
            <div class="input-group">
                <label>ชื่อกลุ่ม (เช่น ไปกินหมูกระทะ):</label>
                <input type="text" id="group-name" placeholder="ระบุชื่อกลุ่ม">
            </div>
            <div class="input-group">
                <label>รายชื่อสมาชิก (คั่นด้วยลูกน้ำ ','):</label>
                <input type="text" id="group-members" placeholder="เช่น A, B, C, D">
            </div>
            <button onclick="createGroup()" class="btn-primary">สร้างกลุ่มเลย!</button>
        </section>

        <section id="expense-section" class="card hidden">
            <h2 id="display-group-name">ชื่อกลุ่ม</h2>
            
            <div class="expense-form">
                <h3>เพิ่มรายการจ่ายเงิน</h3>
                <div class="input-group">
                    <label>ใครเป็นคนจ่าย?</label>
                    <select id="payer-select"></select>
                </div>
                <div class="input-group">
                    <label>จำนวนเงิน (บาท):</label>
                    <input type="number" id="amount" placeholder="0.00">
                </div>
                <div class="input-group">
                    <label>รายละเอียด:</label>
                    <input type="text" id="detail" placeholder="เช่น ค่าอาหาร, ค่าที่จอดรถ">
                </div>
                <button onclick="addExpense()" class="btn-primary">บันทึกรายการ</button>
            </div>

            <button onclick="calculateSummary()" class="btn-secondary mt-1">📊 สรุปยอดและคำนวณเงิน</button>
        </section>

        <section id="summary-section" class="card hidden">
            <h2>สรุปการหารเงิน</h2>
            <div class="summary-box">
                <p>💰 ยอดรวมทั้งหมด: <span id="sum-total" class="highlight">0</span> บาท</p>
                <p>👨‍👩‍👧‍👦 เฉลี่ยคนละ: <span id="sum-per-person" class="highlight">0</span> บาท</p>
            </div>
            
            <h3>รายการใครต้องโอนให้ใคร</h3>
            <ul id="transactions-list" class="transactions-list"></ul>
            
            <h3>ประวัติการจ่าย</h3>
            <ul id="expense-history" class="history-list"></ul>

            <button onclick="location.reload()" class="btn-secondary mt-1">🏠 กลับหน้าแรก</button>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
